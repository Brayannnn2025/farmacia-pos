<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login | POS Farmacia</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
<header>
  <div class="brand">POS Farmacia (Local)</div>
  <div class="small">Una sola PC · Sin internet</div>
</header>

<div class="container">
  <div class="card" style="max-width:480px;margin:40px auto;">
    <h2>Iniciar sesión</h2>

    <!-- ✅ Nota: ahora el login pide SLUG -->
    <p class="small">
      Farmacia (slug) ejemplo: <b>farmacia-sanmartin</b> o <b>default</b><br/>
      Usuario por defecto (tenant default): <b>admin</b> · Clave: <b>admin123</b>
    </p>

    <div class="row">
      <!-- ✅ NUEVO: tenant slug -->
      <input id="tenant" placeholder="Farmacia (slug) ej: farmacia-sanmartin" autocomplete="off" />

      <input id="username" placeholder="Usuario" autocomplete="username"/>
      <input id="password" placeholder="Contraseña" type="password" autocomplete="current-password"/>
    </div>

    <div class="row" style="margin-top:10px;">
      <button id="btnLogin" type="button">Entrar</button>
    </div>

    <p id="msg" class="small" style="color:#ef4444"></p>
  </div>
</div>

<script src="app.js"></script>
<script>
  // si ya está logueado -> a su home según rol
  if (token()) location.href = homeForRole();

  async function doLogin(){
    $("msg").textContent = "";
    $("btnLogin").disabled = true;
    $("btnLogin").textContent = "Entrando...";

    try{
      const tenant_slug = ($("tenant")?.value || "").trim(); // ✅ NUEVO
      const username = $("username").value.trim();
      const password = $("password").value.trim();

      // Validación rápida (superadmin no necesita slug)
      if (username !== "superadmin" && !tenant_slug) {
        throw new Error("Escribe la farmacia (slug). Ej: default o farmacia-sanmartin");
      }

      const r = await api("/api/login", {
        method:"POST",
        body: JSON.stringify({ tenant_slug, username, password })
      });

      localStorage.setItem("token", r.token);
      setUser(r.user);

      // ✅ Guardamos tenant_slug para todas las requests (si no es superadmin)
      if (r.user?.role !== "superadmin") {
        localStorage.setItem("tenant_slug", tenant_slug);
      } else {
        // si es superadmin, limpiamos tenant para evitar conflictos
        localStorage.removeItem("tenant_slug");
      }

      // ✅ redirige según rol
      location.href = homeForRole();

    }catch(e){
      $("msg").textContent = e.message;
    }finally{
      $("btnLogin").disabled = false;
      $("btnLogin").textContent = "Entrar";
    }
  }

  $("btnLogin").onclick = doLogin;

  // Enter para login rápido:
  // - si estás en password, entra
  // - si estás en tenant o username, también entra
  ["tenant","username","password"].forEach(id=>{
    const el = $(id);
    if (!el) return;
    el.addEventListener("keydown", (ev)=>{
      if(ev.key === "Enter") doLogin();
    });
  });
</script>
</body>
</html>
